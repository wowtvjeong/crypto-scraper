name: 아침저녁 브리핑

on:
  schedule:
    # cron은 UTC 기준. 한국시간(KST)은 UTC+9.
    - cron: "0 23 * * *"   # 매일 23:00 UTC = 다음날 08:00 KST (아침 브리핑)
    - cron: "0 11 * * *"   # 매일 11:00 UTC = 20:00 KST (저녁 브리핑)
  workflow_dispatch: {}     # Actions 탭에서 수동 실행도 가능

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 브리핑 생성 및 텔레그램 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/generate_briefing.py
