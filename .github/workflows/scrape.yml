name: 기사 수집 및 속보 알림

on:
  schedule:
    # 30분마다 실행. GitHub 무료 플랜에서는 트래픽에 따라 몇 분 지연될 수 있음.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # 저장소의 Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write   # docs/articles.json 커밋을 위해 필요

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 수집 + AI 필터링 + 속보 알림 실행
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOPANIC_API_KEY: ${{ secrets.CRYPTOPANIC_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: 결과 커밋 & 푸시 (변경 있을 때만)
        run: |
          git config user.name "scrap-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/articles.json docs/archive
          git diff --staged --quiet || git commit -m "chore: 기사 자동 수집 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
