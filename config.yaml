enable_cryptopanic: false  # CryptoPanic은 요금제가 유료일 수 있어 기본 꺼둠 — 가입 페이지에서 직접 확인 후 켜세요
enable_xangle: true         # Xangle 리서치 API 직접 연동 (app/xangle_scraper.py)
enable_bloomingbit: true    # Bloomingbit JSON-LD 직접 파싱 (app/bloomingbit_scraper.py)
enable_coinness: true       # Coinness API 직접 연동 (app/coinness_scraper.py)

# ✅ wublockchainenglish: 텔레그램에서 직접 확인 완료 (구독자 27만+, 정상 공개 채널)
# ❌ coindeskkorea: 확인해보니 공개 채널이 아니라 봇(bot)들만 있어서 제거함
#    → 대신 아래 press_sites의 coindesk_korea RSS로 같은 매체 콘텐츠를 받습니다
telegram_channels:
  - name: "wublockchainenglish"

press_sites:
  # ---------- 국내 (정상 작동 확인됨) ----------
  - name: "tokenpost"
    rss: "https://www.tokenpost.kr/rss"
  - name: "blockmedia"
    rss: "https://www.blockmedia.co.kr/feed"

  # 디센터: 실제 F12로 구조 확인 완료 (2026-07-09)
  - name: "decenter"
    list_url: "https://decenter.kr/"
    item_selector: "div.cube_box li"
    title_selector: "dt"
    link_selector: "a.mi_wrap_i"

  # ---------- 해외 (정상 작동 확인됨) ----------
  - name: "cointelegraph"
    rss: "https://cointelegraph.com/rss"
  - name: "decrypt"
    rss: "https://decrypt.co/feed"
  - name: "coindesk"
    rss: "https://www.coindesk.com/arc/outboundfeeds/rss/"
  - name: "blockworks"
    rss: "https://blockworks.co/feed"

  # ---------- 제거됨 (2026-07-09 실행 로그에서 실패 확인) ----------
  # coindesk_korea: RSS 주소 415 에러 — 실제 주소 재확인 필요
  # decenter: 셀렉터 방식 404 에러 — list_url 자체가 잘못됨
  # theblock: 셀렉터 방식 403 에러 — 봇 차단, 이 방식으론 우회 어려움

  # ---------- 신규 요청 (2026-07-10, 검증 안 됨 — 실행 로그로 판단 필요) ----------
  # 아래 5개는 대부분 React/Next.js 기반이라 순수 HTML 스크래핑이 안 통할 가능성이 높음.
  # 0건이 뜨면 "URL이 틀려서"가 아니라 "JS 렌더링이 필요해서"일 수 있음 — 그 경우
  # 지금 방식(httpx+BeautifulSoup)으로는 근본적으로 해결이 안 되고 구조를 새로 짜야 함.

  - name: "coingecko_news"
    list_url: "https://www.coingecko.com/ko/news"
    item_selector: "div[rel='nofollow noopener']"
    title_selector: ".tw-font-bold"
    link_selector: "a"

  # coinness: press_sites가 아니라 app/coinness_scraper.py로 API 직접 연동함
  # (config.yaml 맨 위 enable_coinness: true 로 켜고 끔)

  # xangle: press_sites가 아니라 app/xangle_scraper.py로 API 직접 연동함
  # (config.yaml 맨 위 enable_xangle: true 로 켜고 끔)

  # bloomingbit: press_sites가 아니라 app/bloomingbit_scraper.py로 JSON-LD 직접 파싱함
  # (config.yaml 맨 위 enable_bloomingbit: true 로 켜고 끔)

  - name: "coinmarketcap_community"
    list_url: "https://coinmarketcap.com/community/ko/articles/"
    item_selector: "div[data-test='article-item']"
    title_selector: "span[data-test='article-title']"
    link_selector: "a"

filter:
  min_relevance_score: 7
  breaking_score: 9          # 이 점수 이상 + 신규 기사면 텔레그램 즉시 알림
  keywords_boost:
    - "비트코인"
    - "이더리움"
    - "SEC"
    - "ETF"
    - "김치프리미엄"

health_check:
  enabled: true
  consecutive_zero_threshold: 3   # 연속 3회(약 1.5시간, 30분 간격 기준) 0건이면 텔레그램 알림

briefing:
  enabled: true
  top_n: 5              # 브리핑에 넣을 기사 개수
  lookback_hours: 13     # 직전 몇 시간치 기사 중에서 고를지 (12시간 간격 + 1시간 여유)

schedule:
  interval_minutes: 30
